{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Reports</h2>

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h2>{{ total_users }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Courses</h5>
                    <h2>{{ total_courses }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Enrollments</h5>
                    <h2>{{ total_enrollments }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Payments</h5>
                    <h2>{{ total_payments }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Revenue</h5>
                    <h2>₹{{ total_revenue }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
