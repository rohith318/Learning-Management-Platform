<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %}</title>

    {% load static %}

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Dashboard CSS -->

    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">

            <i class="bi bi-mortarboard-fill"></i>

            <span>LearnPro</span>

        </div>

        <ul>

            <li>

                <a href="{% url 'user_dashboard' %}" class="sidebar-link">

                    <i class="bi bi-grid-fill"></i>

                    <span>Dashboard</span>

                </a>

            </li>

            <li>

                <a href="{% url 'my_courses' %}" class="sidebar-link">

                    <i class="bi bi-play-circle-fill"></i>

                    <span>My Courses</span>

                </a>

            </li>

            <li>

                <a href="{% url 'subscription' %}" class="sidebar-link">

                    <i class="bi bi-credit-card-fill"></i>

                    <span>Subscription</span>

                </a>

            </li>

            <li>

                <a href="{% url 'payments' %}" class="sidebar-link">

    <i class="bi bi-wallet-fill"></i>

    <span>Payments</span>

</a>

            </li>

            <li>

                <a href="{% url 'profile' %}" class="sidebar-link">

    <i class="bi bi-person-fill"></i>

    <span>Profile</span>

</a>

            </li>

            <li>

                <a href="{% url 'user_logout' %}" class="sidebar-link">

                    <i class="bi bi-box-arrow-right"></i>

                    <span>Logout</span>

                </a>

            </li>

        </ul>

    </aside>

    <main class="main-content">

        {% block content %}

        {% endblock %}

    </main>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
